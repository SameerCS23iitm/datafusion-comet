name: Build Comet JAR (Spark 3.5)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-spark35-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-spark35-

      - name: Install protoc
        run: |
          wget -q https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip -O /tmp/protoc.zip
          unzip -q /tmp/protoc.zip -d /tmp/protoc-dist
          sudo mv /tmp/protoc-dist/bin/protoc /usr/local/bin/protoc
          protoc --version

      - name: Remove vendor config (use crates.io directly)
        run: rm -f native/.cargo/config.toml

      - name: Build native library
        working-directory: native
        env:
          PROTOC: /usr/local/bin/protoc
        run: cargo build --release

      - name: Build JVM JAR
        run: ./mvnw clean package -DskipTests -Pspark-3.5 -Prelease

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: comet-spark35-jar
          path: spark/target/comet-spark-spark3.5_2.12-*.jar
          if-no-files-found: error
